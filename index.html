<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mars Metrics: 3-Body Spin Synchronization</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 5px; font-size: 24px; color: #f8f8f2; }
        .description { color: #8be9fd; margin-bottom: 20px; font-size: 14px; text-align: center; }
        .container { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        .panel { background: #1e1f29; padding: 15px; border-radius: 8px; border: 1px solid #44475a; }
        canvas { background: #0b0f19; border: 1px solid #282a36; border-radius: 4px; }
        .controls { margin-top: 20px; width: 100%; max-width: 1030px; background: #1e1f29; padding: 15px; border-radius: 8px; border: 1px solid #44475a; box-sizing: border-box; }
        .slider-group { display: flex; align-items: center; gap: 15px; }
        label { font-size: 14px; min-width: 150px; }
        input[type=range] { flex-grow: 1; accent-color: #50fa7b; }
        .val-display { min-width: 80px; text-align: right; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

    <h1>Mars Metrics</h1>
    <div class="description">3-Body Spin-Orbit Coupling Matrix — Real-Time Phase Synchronization Graph</div>

    <div class="container">
        <div class="panel">
            <h3 style="margin-top:0; color: #ff79c6;">Coupled Spin-Orbit Cavity</h3>
            <canvas id="syncCanvas" width="500" height="500"></canvas>
        </div>
        <div class="panel">
            <h3 style="margin-top:0; color: #50fa7b;">3-Body Synchronization Wave</h3>
            <canvas id="graphCanvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="controls">
        <div class="slider-group">
            <label for="speedSlider">Time Step Acceleration:</label>
            <input type="range" id="speedSlider" min="0.00001" max="0.0005" step="0.00001" value="0.0001">
            <span id="speedVal" class="val-display">0.0001</span>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. SYSTEM STRUCTURAL PARAMETERS (Derived)
        // ==========================================
        const EPSILON = 1 / 64;
        const TORSION_FACTOR = 5 / 3;

        const r_Phobos = 1 + (112 * EPSILON);                 // 2.750 R_M
        const r_Deimos = 1 + (228 * EPSILON * TORSION_FACTOR); // 6.9375 R_M

        // Frequencies scaled relative to 1 Mars Year baseline
        const f_Mars_Spin = 669.59Basic; // Mars Sols per Mars Year (approximate structural baseline)
        const f_Phobos = 2154.11558;
        const f_Deimos = 544.16760;

        // Angular Velocities
        const omega_M = 2 * Math.PI * 669.5928; // Precise rotation velocity
        const omega_P = 2 * Math.PI * f_Phobos;
        const omega_D = 2 * Math.PI * f_Deimos;

        // Canvas routing
        const sCanvas = document.getElementById('syncCanvas');
        const sCtx = sCanvas.getContext('2d');
        const gCanvas = document.getElementById('graphCanvas');
        const gCtx = gCanvas.getContext('2d');

        const speedSlider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedVal');

        let time = 0;
        const graphHistory = [];

        function animate() {
            const dt = parseFloat(speedSlider.value);
            time += dt;

            // 1. Calculate Instantaneous Rotational Phases
            const phi_M = (omega_M * time) % (2 * Math.PI);
            const phi_P = (omega_P * time) % (2 * Math.PI);
            const phi_D = (omega_D * time) % (2 * Math.PI);

            // Coordinates for physical rendering
            const pX = r_Phobos * Math.cos(phi_P);
            const pY = r_Phobos * Math.sin(phi_P);
            const dX = r_Deimos * Math.cos(phi_D);
            const dY = r_Deimos * Math.sin(phi_D);

            // 2. Compute 3-Body Triadic Phase Convergence
            // Measures the simultaneous alignment between planet spin and satellite vectors
            let diff_MP = Math.abs(phi_M - phi_P); diff_MP = Math.min(diff_MP, 2 * Math.PI - diff_MP);
            let diff_PD = Math.abs(phi_P - phi_D); diff_PD = Math.min(diff_PD, 2 * Math.PI - diff_PD);
            let diff_DM = Math.abs(phi_D - phi_M); diff_DM = Math.min(diff_DM, 2 * Math.PI - diff_DM);

            // Combined synchronization score (1.0 = absolute perfect triadic convergence)
            const syncScore = (1 - diff_MP/(2*Math.PI)) * (1 - diff_PD/(2*Math.PI)) * (1 - diff_DM/(2*Math.PI));
            
            graphHistory.push(syncScore);
            if (graphHistory.length > gCanvas.width) graphHistory.shift();

            // Clear viewports
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);

            // ------------------------------------------
            // RENDER LEFT CANVAS: CAVITY SPACE
            // ------------------------------------------
            const cX = sCanvas.width / 2;
            const cY = sCanvas.height / 2;
            const scale = 32;

            // Draw central planet disk (Mars core)
            sCtx.beginPath();
            sCtx.arc(cX, cY, scale, 0, 2 * Math.PI);
            sCtx.strokeStyle = '#44475a';
            sCtx.lineWidth = 2;
            sCtx.stroke();

            // Draw planet spin orientation vector line
            sCtx.beginPath();
            sCtx.moveTo(cX, cY);
            sCtx.lineTo(cX + scale * Math.cos(phi_M), cY + scale * Math.sin(phi_M));
            sCtx.strokeStyle = '#f8f8f2';
            sCtx.lineWidth = 3;
            sCtx.stroke();

            // Inter-body conjugation mesh lines (like Venusian Metrics)
            sCtx.lineWidth = 0.5;
            sCtx.strokeStyle = 'rgba(139, 233, 253, 0.3)';
            sCtx.beginPath();
            sCtx.moveTo(cX + pX*scale, cY + pY*scale);
            sCtx.lineTo(cX + dX*scale, cY + dY*scale); // Phobos to Deimos link
            sCtx.stroke();

            sCtx.strokeStyle = 'rgba(255, 121, 198, 0.3)';
            sCtx.beginPath();
            sCtx.moveTo(cX + scale * Math.cos(phi_M), cY + scale * Math.sin(phi_M));
            sCtx.lineTo(cX + pX*scale, cY + pY*scale); // Spin vector to Phobos link
            sCtx.stroke();

            // Draw Body Nodes
            sCtx.fillStyle = '#ff79c6'; // Phobos Node
            sCtx.beginPath();
            sCtx.arc(cX + pX*scale, cY + pY*scale, 4, 0, 2 * Math.PI);
            sCtx.fill();

            sCtx.fillStyle = '#8be9fd'; // Deimos Node
            sCtx.beginPath();
            sCtx.arc(cX + dX*scale, cY + dY*scale, 5, 0, 2 * Math.PI);
            sCtx.fill();

            // ------------------------------------------
            // RENDER RIGHT CANVAS: SCROLLING SYNCHRONIZATION WAVE
            // ------------------------------------------
            gCtx.strokeStyle = '#282a36';
            gCtx.lineWidth = 1;
            for(let i = 1; i < 5; i++) {
                let y = gCanvas.height - (i * (gCanvas.height / 5));
                gCtx.beginPath(); gCtx.moveTo(0, y); gCtx.lineTo(gCanvas.width, y); gCtx.stroke();
            }

            gCtx.beginPath();
            gCtx.strokeStyle = '#50fa7b';
            gCtx.lineWidth = 1.5;
            for (let i = 0; i < graphHistory.length; i++) {
                let gx = i;
                // Scale score down to fit graph view comfortably
                let gy = gCanvas.height - (graphHistory[i] * (gCanvas.height - 40)) - 20;
                if (i === 0) gCtx.moveTo(gx, gy); else gCtx.lineTo(gx, gy);
            }
            gCtx.stroke();

            requestAnimationFrame(animate);
        }

        speedSlider.addEventListener('input', (e) => {
            speedDisplay.textContent = parseFloat(e.target.value).toFixed(5);
        });

        animate();
    </script>
</body>
</html>
